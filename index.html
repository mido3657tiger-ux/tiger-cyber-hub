<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger Cyber Hub</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
            border: 1px solid #222;
            border-radius: 12px;
            background: #111;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 1px;
        }
        p {
            color: #888;
            font-size: 1.1rem;
            line-height: 1.6;
        }
        .badge {
            background: #fff;
            color: #000;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">قريباً</div>
        <h1>TIGER CYBER HUB</h1>
        <p>مرحباً بك في عالم التطوير والأمن السيبراني. الموقع حالياً تحت الإنشاء وجاري إطلاق المشاريع الخارقة.</p>
    </div>

</body>
</html>
